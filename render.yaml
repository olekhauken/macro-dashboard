# render.yaml
# ===========
# Konfigurasjon for Render.com-deployment.
#
# runtime: docker – Render bruker Dockerfile for å bygge og kjøre appen.
# Dette gir full kontroll over Python-versjonen (3.11.9 i Dockerfile)
# og unngår at Render velger feil standard-versjon automatisk.

services:
  - type: web
    name: macro-dashboard
    runtime: docker
    plan: free

    # Render sjekker denne stien for å bekrefte at appen er oppe
    healthCheckPath: /
